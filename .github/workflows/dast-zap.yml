# DAST: OWASP ZAP baseline scan. Run against a deployed app (e.g. preview or staging).
# For scheduled run: set repo secret DAST_TARGET_URL. For manual run: use workflow_dispatch and pass target_url.

name: DAST (OWASP ZAP)

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to scan (e.g. https://staging.example.com)'
        required: true
        type: string

jobs:
  zap-baseline:
    name: ZAP Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.DAST_TARGET_URL != ''
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ github.event.inputs.target_url || vars.DAST_TARGET_URL }}
          cmd_options: '-a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30
